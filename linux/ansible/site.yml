---
- name: Pi server infrastructure
  hosts: pi
  become: true
  gather_facts: false

  vars_files:
    - vars/private.yml
    - vars/ssh_keys.yml

  vars:
    dotfiles_dir: /home/admin/repositories/dotfiles
    user_name: admin
    user_home: /home/admin

    authorized_ssh_keys:
      - "{{ ssh_pubkeys.mac }}"

    claude_files:
      - src: "{{ lookup('env', 'HOME') }}/repositories/dotfiles/CLAUDE.md"
        dest: "{{ dotfiles_dir }}/CLAUDE.md"
      - src: "{{ lookup('env', 'HOME') }}/repositories/pi-dashboard/CLAUDE.md"
        dest: "{{ user_home }}/repositories/pi-dashboard/CLAUDE.md"

    timers:
      - backup-pi.timer
      - health-check-pi.timer
      - freshrss-digest.timer
      - freshrss-maintenance.timer
      - pkg-maintenance.timer
      - wifi-watchdog.timer
      - monthly-review.timer
      - gpx-manifest.path

  pre_tasks:
    - name: Gather facts (only when needed)
      setup:
      tags: [sshd, nginx, fail2ban, sudoers]

    - name: Create autoupdate state directory
      file:
        path: /var/lib/freshrss-autoupdate
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create backup directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
      loop:
        - "{{ user_home }}/backups"
        - "{{ user_home }}/Vault/Backups"

  roles:
    - { role: sshd, tags: [sshd] }
    - { role: scripts, tags: [scripts] }
    - { role: systemd, tags: [systemd] }
    - { role: nginx, tags: [nginx] }
    - { role: configs, tags: [configs] }
    - { role: dashboard, tags: [dashboard] }
    - { role: sudoers, tags: [sudoers] }
    - { role: fail2ban, tags: [fail2ban] }
    - { role: authorized_keys, tags: [authorized_keys] }
    - { role: claude, tags: [claude] }

- name: Arch-server infrastructure
  hosts: arch
  become: true
  gather_facts: false

  vars_files:
    - vars/private.yml
    - vars/ssh_keys.yml

  vars:
    dotfiles_dir: /home/admin/repositories/dotfiles
    user_name: admin
    user_home: /home/admin

    authorized_ssh_keys:
      - "{{ ssh_pubkeys.mac }}"
      - "{{ ssh_pubkeys.proxmox }}"

    claude_files:
      - src: "{{ lookup('env', 'HOME') }}/repositories/dotfiles/CLAUDE.md"
        dest: "{{ dotfiles_dir }}/CLAUDE.md"

    timers:
      - backup-arch.timer
      - health-check-arch.timer
      - pkg-maintenance.timer
      - tailscale-certrenew.timer
      - qbt-cleanup.timer

  pre_tasks:
    - name: Gather facts (only when needed)
      setup:
      tags: [sshd, nginx, fail2ban]

    - name: Set tailscale hostname for arch
      set_fact:
        tailscale_hostname: "{{ tailscale_hostname_arch }}"
      tags: [nginx]

    - name: Create backup directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
      loop:
        - "{{ user_home }}/backups"
        - "{{ user_home }}/Vault/Backups"

    - name: Remove old passwordless sudo file
      file:
        path: /etc/sudoers.d/010_admin-nopasswd
        state: absent

    - name: Deploy sudo for admin (NOPASSWD)
      copy:
        content: "admin ALL=(ALL) NOPASSWD: ALL\n"
        dest: /etc/sudoers.d/010_admin-sudo
        mode: "0440"
        validate: visudo -cf %s

  roles:
    - { role: sshd, tags: [sshd] }
    - { role: scripts, tags: [scripts] }
    - { role: systemd, tags: [systemd] }
    - { role: nginx, tags: [nginx] }
    - { role: fail2ban, tags: [fail2ban] }
    - { role: authorized_keys, tags: [authorized_keys] }
    - { role: claude, tags: [claude] }

- name: Proxmox host infrastructure
  hosts: proxmox
  become: true
  gather_facts: false

  vars_files:
    - vars/ssh_keys.yml

  vars:
    dotfiles_dir: /root/repositories/dotfiles
    user_name: root
    user_home: /root

    authorized_ssh_keys:
      - "{{ ssh_pubkeys.mac }}"

    timers:
      - backup-proxmox.timer
      - health-check-proxmox.timer
      - pkg-maintenance.timer

  pre_tasks:
    - name: Gather facts (only when needed)
      setup:
      tags: [sshd]

    - name: Create backup directory
      file:
        path: "{{ user_home }}/backups"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"

  roles:
    - { role: sshd, tags: [sshd] }
    - { role: scripts, tags: [scripts] }
    - { role: systemd, tags: [systemd] }
    - { role: authorized_keys, tags: [authorized_keys] }
