---
- name: Check if pi-dashboard repo exists
  stat:
    path: "{{ user_home }}/repositories/pi-dashboard"
  register: dashboard_repo

- name: Symlink dashboard to /var/www/
  file:
    src: "{{ user_home }}/repositories/pi-dashboard"
    dest: /var/www/pi-dashboard
    state: link
    force: true
  when: dashboard_repo.stat.exists

- name: Check if hiking-map repo exists
  stat:
    path: "{{ user_home }}/repositories/hiking-map"
  register: hiking_map_repo

- name: Symlink hiking-map to /var/www/
  file:
    src: "{{ user_home }}/repositories/hiking-map"
    dest: /var/www/hiking-map
    state: link
    force: true
  when: hiking_map_repo.stat.exists

- name: Check if pinpoints repo exists
  stat:
    path: "{{ user_home }}/repositories/pinpoints"
  register: pinpoint_map_repo

- name: Symlink pinpoints to /var/www/
  file:
    src: "{{ user_home }}/repositories/pinpoints"
    dest: /var/www/pinpoints
    state: link
    force: true
  when: pinpoint_map_repo.stat.exists

- name: Check if GPX backup exists
  stat:
    path: "{{ user_home }}/Vault/Backups/repositories/gpx-trails"
  register: gpx_backup

- name: Sync GPX files from Vault backup to hiking-map
  synchronize:
    src: "{{ user_home }}/Vault/Backups/repositories/gpx-trails/"
    dest: "{{ user_home }}/repositories/hiking-map/gpx/"
    delete: true
    recursive: true
  delegate_to: "{{ inventory_hostname }}"
  when: hiking_map_repo.stat.exists and gpx_backup.stat.exists

- name: Check if pinpoints backup exists
  stat:
    path: "{{ user_home }}/Vault/Backups/repositories/pinpoints"
  register: pinpoints_backup

- name: Symlink places.json from Vault backup to pinpoints
  file:
    src: "{{ user_home }}/Vault/Backups/repositories/pinpoints/places.json"
    dest: "{{ user_home }}/repositories/pinpoints/places.json"
    state: link
    force: true
  when: pinpoint_map_repo.stat.exists and pinpoints_backup.stat.exists
